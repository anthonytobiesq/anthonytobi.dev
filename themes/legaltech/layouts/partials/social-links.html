{{ with .Site.Params.socials }}
  <div class="social-links" aria-label="Social links">
    {{ range . }}
      <a href="{{ .url }}" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="{{ .name }}">
        <span class="social-icon" aria-hidden="true">
          {{- if eq .name "GitHub" -}}
            <svg viewBox="0 0 24 24" role="img" focusable="false">
              <path fill="currentColor" d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.23c-3.34.73-4.04-1.42-4.04-1.42-.55-1.38-1.33-1.75-1.33-1.75-1.08-.74.08-.73.08-.73 1.2.08 1.83 1.22 1.83 1.22 1.06 1.82 2.8 1.29 3.48.99.11-.77.42-1.29.76-1.58-2.66-.3-5.47-1.34-5.47-5.94 0-1.31.47-2.39 1.23-3.23-.12-.3-.53-1.53.12-3.18 0 0 1.01-.32 3.3 1.23a11.4 11.4 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.65 1.65.24 2.88.12 3.18.77.84 1.23 1.92 1.23 3.23 0 4.61-2.81 5.64-5.49 5.94.43.38.82 1.12.82 2.26v3.35c0 .32.22.7.83.58A12 12 0 0 0 12 .5Z"/>
            </svg>
          {{- else if eq .name "Twitter" -}}
            <svg viewBox="0 0 24 24" role="img" focusable="false">
              <path fill="currentColor" d="M18.9 2H22l-6.77 7.74L23.2 22h-6.25l-4.89-7.38L5.6 22H2.5l7.24-8.28L.8 2h6.4l4.42 6.76L18.9 2Zm-1.1 18h1.73L6.26 3.9H4.4L17.8 20Z"/>
            </svg>
          {{- else if eq .name "LinkedIn" -}}
            <svg viewBox="0 0 24 24" role="img" focusable="false">
              <path fill="currentColor" d="M4.98 3.5A2.49 2.49 0 1 0 5 8.48 2.49 2.49 0 0 0 4.98 3.5ZM3 9h4v12H3Zm7 0h3.83v1.71h.05c.53-1.01 1.84-2.08 3.79-2.08 4.05 0 4.8 2.66 4.8 6.12V21h-4v-5.49c0-1.31-.03-2.99-1.82-2.99-1.82 0-2.1 1.42-2.1 2.89V21h-4Z"/>
            </svg>
          {{- else if eq .name "TikTok" -}}
            <svg viewBox="0 0 24 24" role="img" focusable="false">
              <path fill="currentColor" d="M14 3c.45 2.55 1.96 4.3 4.5 4.5v3.02a7.56 7.56 0 0 1-3.5-.86v5.81A5.47 5.47 0 1 1 9.53 10.1v3.14a2.48 2.48 0 1 0 2.47 2.47V3H14Z"/>
            </svg>
          {{- end -}}
        </span>
        <span>{{ .name }}</span>
      </a>
    {{ end }}
  </div>
{{ end }}
