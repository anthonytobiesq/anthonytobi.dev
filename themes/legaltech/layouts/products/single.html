{{ define "main" }}
<div class="container page-content">
  <div class="product-single">
    <h1>{{ .Title }}</h1>
    <div class="badge">{{ .Params.status }}</div>
    {{ if .Params.image }}
    <img src="{{ .Params.image | relURL }}" alt="{{ .Title }}" style="width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px; margin-bottom: 30px; border: 1px solid var(--card-border);">
    {{ end }}
    <div class="content">
      {{ .Content }}
    </div>
  </div>
</div>
{{ end }}
