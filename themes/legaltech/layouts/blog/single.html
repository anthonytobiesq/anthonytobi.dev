{{ define "main" }}
<div class="container page-content">
  <article class="post-single">
    <h1>{{ .Title }}</h1>
    <div class="meta">{{ .Date.Format "January 2, 2006" }}</div>
    {{ $title := .Title }}
    {{ $url := .Permalink }}
    <div class="share-bar glass" aria-label="Share this article">
      <span class="share-label">Share this post</span>
      <div class="share-actions">
        <a
          class="share-link"
          href="https://x.com/intent/tweet?text={{ printf "%s %s" $title $url | urlquery }}"
          target="_blank"
          rel="noopener noreferrer"
        >
          X
        </a>
        <a
          class="share-link"
          href="https://www.linkedin.com/sharing/share-offsite/?url={{ $url | urlquery }}"
          target="_blank"
          rel="noopener noreferrer"
        >
          LinkedIn
        </a>
        <a
          class="share-link"
          href="https://wa.me/?text={{ printf "%s %s" $title $url | urlquery }}"
          target="_blank"
          rel="noopener noreferrer"
        >
          WhatsApp
        </a>
        <a
          class="share-link"
          href="mailto:?subject={{ $title | urlquery }}&body={{ printf "I thought you might enjoy this post:%s%s" "%0A%0A" $url }}"
        >
          Email
        </a>
        <button
          class="share-link share-copy"
          type="button"
          data-share-url="{{ $url }}"
          data-copy-default="Copy Link"
          data-copy-success="Copied!"
        >
          Copy Link
        </button>
      </div>
    </div>
    <div class="content">
      {{ .Content }}
    </div>
  </article>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const copyButton = document.querySelector(".share-copy");
    if (!copyButton) return;

    copyButton.addEventListener("click", async function () {
      const url = copyButton.getAttribute("data-share-url");
      const defaultText = copyButton.getAttribute("data-copy-default") || "Copy Link";
      const successText = copyButton.getAttribute("data-copy-success") || "Copied!";

      try {
        await navigator.clipboard.writeText(url);
        copyButton.textContent = successText;
        setTimeout(function () {
          copyButton.textContent = defaultText;
        }, 1800);
      } catch (error) {
        copyButton.textContent = "Copy failed";
        setTimeout(function () {
          copyButton.textContent = defaultText;
        }, 1800);
      }
    });
  });
</script>
{{ end }}
